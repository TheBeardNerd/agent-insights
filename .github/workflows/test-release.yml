name: Test and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: |
          find test -name "*.test.js" -type f
          node --test test/core/analyze/analyze-sessions.test.js

  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create version tag
        run: |
          git checkout main
          VERSION="v$(node -p \"require('./package.json').version\")"
          git tag "$VERSION"
          git push origin "$VERSION"