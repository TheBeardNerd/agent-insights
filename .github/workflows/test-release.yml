name: Test and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run tests
        run: |
          for f in test/core/analyze/*.test.js test/core/ingest/*.test.js test/core/report/*.test.js test/opencode/*.test.js; do
            node --test "$f"
          done

  release:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create version tag
        run: |
          VERSION=v$(node -p "require('./package.json').version")
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          git tag "$VERSION"
          git push origin "$VERSION"